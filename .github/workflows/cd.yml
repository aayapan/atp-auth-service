name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [master]

jobs:
  publish-image:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out the tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Compute short SHA
        id: vars
        env:
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha }}
        run: echo "short_sha=${WORKFLOW_SHA:0:12}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/auth-service:${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Clone GitOps repository
        run: git clone https://x-access-token:${{ secrets.GITOPS_PAT }}@github.com/${{ secrets.GITOPS_REPO }}.git gitops

      - name: Update SIT kustomization image tag
        env:
          SHA12: ${{ steps.vars.outputs.short_sha }}
        run: |
          cd gitops
          sed -i "s|^\(\s*newTag:\s*\).*|\1${SHA12}|" overlays/sit/kustomization.yaml

      - name: Commit and push SIT tag update
        env:
          SHA12: ${{ steps.vars.outputs.short_sha }}
        run: |
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add overlays/sit/kustomization.yaml
          git commit -m "chore(sit): auth-service image -> ${SHA12} [skip ci]" || exit 0
          git push
